name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ matrix.configuration }}

      - name: Test
        run: dotnet test --no-build --configuration ${{ matrix.configuration }} --verbosity normal

  publish:
    runs-on: windows-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$proj = Get-Content src/Cmux/Cmux.csproj
          $version = $proj.Project.PropertyGroup.Version | Select-Object -First 1
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish WPF App
        run: dotnet publish src/Cmux/Cmux.csproj -c Release -r win-x64 --self-contained -o publish/app

      - name: Publish CLI
        run: dotnet publish src/Cmux.Cli/Cmux.Cli.csproj -c Release -r win-x64 --self-contained -o publish/cli

      - name: Create release zip
        shell: pwsh
        run: |
          $zip = "publish/cmux-windows-v${{ steps.version.outputs.version }}-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path publish/app, publish/cli -DestinationPath $zip

      - name: Upload App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-windows-x64
          path: publish/app/

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cmux-cli-windows-x64
          path: publish/cli/

      - name: Upload Release Zip
        uses: actions/upload-artifact@v4
        with:
          name: cmux-windows-v${{ steps.version.outputs.version }}-win-x64
          path: publish/cmux-windows-v${{ steps.version.outputs.version }}-win-x64.zip
