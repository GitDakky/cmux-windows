name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  release:
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version from tag
        id: tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish app, daemon, and CLI
        shell: pwsh
        run: |
          $v = "${{ steps.tag.outputs.version }}"
          dotnet publish src/Cmux/Cmux.csproj -c Release -r win-x64 --self-contained -o publish/app
          dotnet publish src/Cmux.Daemon/Cmux.Daemon.csproj -c Release -r win-x64 --self-contained -o publish/app
          dotnet publish src/Cmux.Cli/Cmux.Cli.csproj -c Release -r win-x64 --self-contained -o publish/cli
          if (-not (Test-Path publish/app/cmuxw.exe)) { throw 'Missing cmuxw.exe' }
          if (-not (Test-Path publish/app/cmux-daemon.exe)) { throw 'Missing cmux-daemon.exe' }
          if (-not (Test-Path publish/cli/cmux.exe)) { throw 'Missing cmux.exe' }
          $zip = "publish/cmux-windows-v$v-win-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive -Path publish/app, publish/cli -DestinationPath $zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/cmux-windows-v${{ steps.tag.outputs.version }}-win-x64.zip
          generate_release_notes: true
